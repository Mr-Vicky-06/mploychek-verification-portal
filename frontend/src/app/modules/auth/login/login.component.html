<div class="login-page">
  <!-- Animated background -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <!-- Login Card -->
  <div class="login-container animate-slide-up">
    <!-- Brand Header -->
    <div class="brand-section">
      <div class="brand-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="url(#login-grad)"/>
          <path d="M11 20L17 26L29 14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="login-grad" x1="0" y1="0" x2="40" y2="40">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#818cf8"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="brand-title">MPloyChek</h1>
      <p class="brand-desc">Enterprise Verification Workflow Portal</p>
    </div>

    <!-- Role Selector -->
    <div class="role-selector">
      <button
        class="role-btn"
        [class.role-btn-active]="selectedRole() === 'admin'"
        (click)="selectRole('admin')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        Admin
      </button>
      <button
        class="role-btn"
        [class.role-btn-active]="selectedRole() === 'user'"
        (click)="selectRole('user')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        User
      </button>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="input-group">
        <label class="input-label">Email</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@mploychek.io"
            class="glass-input input-with-icon"
            autocomplete="email"/>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            class="glass-input input-with-icon"
            autocomplete="current-password"/>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="rememberMe" name="remember" class="checkbox"/>
          <span>Remember session</span>
        </label>
      </div>

      @if (errorMessage()) {
        <div class="error-message animate-fade-in">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        class="btn-primary login-btn"
        [disabled]="isLoading()">
        @if (isLoading()) {
          <div class="spinner"></div>
          Authenticating...
        } @else {
          Sign In
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        }
      </button>
    </form>

    <!-- Demo Credentials -->
    <div class="demo-hint">
      <p>Demo credentials auto-fill on role selection</p>
    </div>
  </div>
</div>
